<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Сечение нагревательного кабеля КДБС</title>
  <desc id="desc">Техническая иллюстрация оболочки, нагревательных жил и установочного шнура.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#18212b"/>
      <stop offset="1" stop-color="#334252"/>
    </linearGradient>
    <linearGradient id="jacket" x1="0" x2="1">
      <stop offset="0" stop-color="#d94120"/>
      <stop offset="0.55" stop-color="#f0713e"/>
      <stop offset="1" stop-color="#9f260f"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" x2="1">
