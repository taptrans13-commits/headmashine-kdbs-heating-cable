  <g font-family="Inter, Arial, sans-serif">
    <text x="78" y="96" fill="#fff" font-size="42" font-weight="800">Конструкция КДБС-40</text>
    <text x="78" y="144" fill="#c8d1dc" font-size="20">Морозостойкая секция для прокладки в бетон</text>
