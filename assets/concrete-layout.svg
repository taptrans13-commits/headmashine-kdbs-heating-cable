<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Раскладка кабеля КДБС в бетоне</title>
  <desc id="desc">Схема размещения нагревательной секции в монолитной плите с шагом укладки и подключением питания.</desc>
  <defs>
    <linearGradient id="slab" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dfe5e8"/>
      <stop offset=".52" stop-color="#8f9aa4"/>
      <stop offset="1" stop-color="#f7fafb"/>
    </linearGradient>
    <linearGradient id="heat" x1="0" x2="1">
      <stop offset="0" stop-color="#e34b27"/>
      <stop offset=".45" stop-color="#f2b84b"/>
      <stop offset="1" stop-color="#e34b27"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#111820" flood-opacity=".26"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="#f5f7f2"/>
  <path d="M0 0h1200v260C1028 226 919 272 780 222 542 136 370 82 0 152z" fill="#24313f" opacity=".08"/>
  <g filter="url(#shadow)" transform="translate(120 160)">
    <path d="M0 115 720 0l270 190-724 150z" fill="url(#slab)"/>
    <path d="M266 340 990 190v145L268 492 0 260V115z" fill="#7a858f"/>
    <path d="M0 115 266 340v152L0 260z" fill="#59636d"/>
    <g fill="none" stroke="#58626c" stroke-width="5" opacity=".45">
      <path d="M122 152l260 214M230 132l260 214M338 112l260 214M446 92l260 214M554 72l260 214"/>
      <path d="M106 206l720-138M168 258l720-139M229 311l720-142"/>
    </g>
    <path d="M120 168c88-20 158 30 244 10 88-20 158-70 245-50 72 16 128 58 212 36" fill="none" stroke="url(#heat)" stroke-width="20" stroke-linecap="round"/>
    <path d="M157 232c88-20 158 30 244 10 88-20 158-70 245-50 72 16 128 58 212 36" fill="none" stroke="url(#heat)" stroke-width="20" stroke-linecap="round"/>
    <path d="M196 296c88-20 158 30 244 10 88-20 158-70 245-50 72 16 128 58 212 36" fill="none" stroke="url(#heat)" stroke-width="20" stroke-linecap="round"/>
    <path d="M814 164l118-24" stroke="#101820" stroke-width="16" stroke-linecap="round"/>
    <circle cx="120" cy="168" r="10" fill="#fff" stroke="#e34b27" stroke-width="5"/>
  </g>
  <g font-family="Inter, Arial, sans-serif">
    <text x="78" y="94" fill="#15191f" font-size="42" font-weight="900">Раскладка в бетон</text>
    <text x="78" y="142" fill="#5d6875" font-size="20">Минимальный шаг между нитками - 70 мм, подключение после проверки секции</text>
    <g transform="translate(832 552)">
      <rect width="276" height="112" rx="8" fill="#24313f"/>
      <text x="24" y="44" fill="#fff" font-size="22" font-weight="900">15 см</text>
      <text x="24" y="78" fill="#c8d1dc" font-size="16">радиус обогрева по карточке товара</text>
    </g>
  </g>
</svg>
